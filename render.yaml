services:
  - type: web
    name: buses-tmb
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TMB_APP_ID
        sync: false
      - key: TMB_APP_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
